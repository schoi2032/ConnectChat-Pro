<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConnectPro | The Blue Hub</title>
    <!-- Favicon link element -->
    <link id="dynamic-favicon" rel="icon" type="image/svg+xml" href="">
    <!-- Lucide Icons via CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* PURE CSS STYLING - NO EXTERNAL FRAMEWORKS REQUIRED */
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');

        :root {
            --primary: #2563eb;
            --primary-dark: #1e3a8a;
            --primary-light: #dbeafe;
            --bg-main: #f0f7ff;
            --white: #ffffff;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --sidebar-bg: #0f172a;
            --radius: 1.5rem;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Utility */
        .hidden { display: none !important; }

        /* Auth Overlays */
        #auth-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-card {
            background: var(--white);
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 2.5rem;
            text-align: center;
            box-shadow: var(--shadow);
            animation: popIn 0.3s ease-out;
        }

        @keyframes popIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .icon-box {
            background: var(--primary);
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        /* Buttons & Inputs */
        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 1rem;
            border: none;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-ghost { background: var(--primary-light); color: var(--primary); }
        .btn-ghost:hover { background: #c3ddfd; }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .input-group label {
            font-size: 10px;
            text-transform: uppercase;
            font-weight: 800;
            color: var(--text-muted);
            margin-left: 5px;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 14px 20px;
            border-radius: 1rem;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            outline: none;
            font-weight: 600;
            margin-top: 5px;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }

        /* Main Layout */
        #main-app {
            width: 95vw;
            height: 90vh;
            background: var(--white);
            border-radius: 3rem;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: var(--shadow);
            border: 1px solid rgba(0,0,0,0.05);
        }

        header {
            background: linear-gradient(135deg, var(--primary-dark), var(--primary));
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        .user-pill {
            background: rgba(255,255,255,0.1);
            padding: 6px 15px;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            font-size: 14px;
        }

        .user-pill img { width: 24px; height: 24px; border-radius: 6px; background: white; }

        .content-area { display: flex; flex: 1; overflow: hidden; }

        /* Sidebar */
        aside {
            width: 280px;
            background: var(--sidebar-bg);
            color: #94a3b8;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .nav-btn {
            width: 100%;
            padding: 15px 20px;
            border-radius: 1rem;
            border: none;
            background: transparent;
            color: inherit;
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 5px;
            transition: 0.2s;
        }

        .nav-btn:hover { background: rgba(255,255,255,0.05); color: white; }
        .nav-btn.active { background: rgba(255,255,255,0.1); color: white; }

        .sidebar-label {
            font-size: 10px;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 2px;
            margin: 20px 0 10px 10px;
            color: #475569;
        }

        /* Room List */
        #rooms-list { flex: 1; overflow-y: auto; }
        .room-item {
            padding: 12px 15px;
            border-radius: 0.75rem;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 4px;
        }
        .room-item:hover { background: rgba(255,255,255,0.05); }
        .room-item.active { background: var(--primary); color: white; }

        /* Main View Container */
        main { flex: 1; display: flex; flex-direction: column; position: relative; }

        /* Chat UI */
        #chat-container { display: flex; flex-direction: column; height: 100%; }
        #messages { flex: 1; overflow-y: auto; padding: 30px; display: flex; flex-direction: column; gap: 15px; background: #f8fafc; }
        
        .msg { max-width: 75%; padding: 15px 20px; border-radius: 1.25rem; font-weight: 600; line-height: 1.5; position: relative; }
        .msg.me { align-self: flex-end; background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .msg.them { align-self: flex-start; background: var(--white); color: var(--text-dark); border-bottom-left-radius: 4px; border: 1px solid #e2e8f0; }
        .msg-info { font-size: 10px; font-weight: 800; text-transform: uppercase; margin-bottom: 4px; opacity: 0.7; }

        .chat-input-area { padding: 25px; background: var(--white); border-top: 1px solid #e2e8f0; display: flex; gap: 15px; }
        .chat-input-area input { margin-top: 0; flex: 1; padding: 18px 25px; border-radius: 2rem; background: #f1f5f9; border: none; }

        /* Empty States */
        .empty-state { flex: 1; display: flex; flex-direction: center; align-items: center; justify-content: center; flex-direction: column; text-align: center; color: var(--text-muted); }
        .empty-state h2 { color: var(--primary-dark); font-weight: 800; margin-top: 20px; }

        /* Modal */
        #modal-container {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.8);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal {
            background: white;
            padding: 40px;
            border-radius: 2.5rem;
            width: 100%;
            max-width: 450px;
            box-shadow: var(--shadow);
        }

        /* Avatar Selection */
        .avatar-grid {
            display: grid;
            grid-template-cols: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
            max-height: 150px;
            overflow-y: auto;
            padding: 5px;
        }
        .avatar-item {
            cursor: pointer;
            border: 3px solid transparent;
            border-radius: 1rem;
            padding: 5px;
            background: var(--bg-main);
        }
        .avatar-item img { width: 100%; height: auto; }
        .avatar-item.active { border-color: var(--primary); background: var(--primary-light); }

        .error-text { color: #ef4444; font-size: 12px; font-weight: 700; text-align: center; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <!-- AUTH OVERLAY -->
    <div id="auth-overlay">
        <!-- Login Form -->
        <div id="login-form" class="auth-card">
            <div class="icon-box"><i data-lucide="zap"></i></div>
            <h1 style="font-weight: 900; font-size: 1.8rem; color: var(--primary-dark)">ConnectPro</h1>
            <p style="color: var(--text-muted); font-weight: 600; margin-bottom: 30px;">Login to your secure node</p>
            
            <div id="account-list" style="margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px;"></div>
            
            <button class="btn btn-primary" onclick="showRegister()">
                <i data-lucide="user-plus" style="width: 18px"></i> New Identity
            </button>
        </div>

        <!-- Register Form -->
        <div id="register-form" class="auth-card hidden">
            <h2 style="font-weight: 800; margin-bottom: 10px;">Create Identity</h2>
            <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 20px;">Pick your digital representative</p>
            
            <div class="avatar-grid" id="avatar-grid"></div>

            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="reg-name" placeholder="John Doe">
            </div>
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="reg-user" placeholder="johndoe">
            </div>

            <button class="btn btn-primary" onclick="handleRegister()">Launch Account</button>
            <button class="btn" style="color: var(--text-muted); font-size: 12px; margin-top: 10px;" onclick="showLogin()">Back to login</button>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="main-app" class="hidden">
        <header>
            <div style="display: flex; align-items: center; gap: 10px;">
                <i data-lucide="zap"></i>
                <span style="font-weight: 800; font-size: 1.2rem; letter-spacing: -0.5px;">ConnectPro</span>
            </div>
            <div style="display: flex; align-items: center; gap: 15px;">
                <div class="user-pill">
                    <img id="header-avatar" src="">
                    <span id="header-name">User</span>
                </div>
                <button onclick="logout()" style="background: rgba(255,255,255,0.1); border: none; color: white; padding: 8px; border-radius: 10px; cursor: pointer;"><i data-lucide="log-out" style="width: 18px"></i></button>
            </div>
        </header>

        <div class="content-area">
            <aside>
                <button class="nav-btn active" onclick="setMode('chat')">
                    <i data-lucide="messages-square"></i> Channels
                </button>
                
                <div class="sidebar-label">Active Nodes</div>
                <div id="rooms-list"></div>

                <div style="display: grid; grid-cols: 1; gap: 8px; margin-top: 10px;">
                    <button class="btn btn-ghost" onclick="openRoomModal('join')" style="padding: 12px; font-size: 12px;">
                        <i data-lucide="arrow-right-circle" style="width: 14px"></i> Join Node
                    </button>
                    <button class="btn btn-primary" onclick="openRoomModal('create')" style="padding: 12px; font-size: 12px; background: #3b82f6;">
                        <i data-lucide="plus" style="width: 14px"></i> New Node
                    </button>
                </div>
            </aside>

            <main>
                <div id="chat-empty" class="empty-state">
                    <div style="background: var(--primary-light); padding: 30px; border-radius: 2rem; color: var(--primary)">
                        <i data-lucide="message-square" style="width: 48px; height: 48px;"></i>
                    </div>
                    <h2>No Active Node</h2>
                    <p style="margin-top: 10px; font-weight: 600;">Join a channel or create a new one to start broadcasting.</p>
                </div>

                <div id="chat-active" class="hidden" style="display: flex; flex-direction: column; height: 100%;">
                    <div style="padding: 20px 30px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; gap: 15px;">
                        <div style="background: var(--primary); color: white; padding: 8px; border-radius: 10px;"><i data-lucide="hash" style="width: 18px"></i></div>
                        <h3 id="active-room-title" style="font-weight: 800; color: var(--primary-dark)">Channel</h3>
                    </div>
                    <div id="messages"></div>
                    <div class="chat-input-area">
                        <input type="text" id="chat-input" placeholder="Type a secure message...">
                        <button class="btn btn-primary" onclick="sendMessage()" style="width: 60px; height: 60px; border-radius: 1.5rem; padding: 0;">
                            <i data-lucide="send"></i>
                        </button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- MODAL CONTAINER -->
    <div id="modal-container" class="hidden">
        <div class="modal">
            <h2 id="modal-title" style="font-weight: 800; margin-bottom: 25px;">Join Node</h2>
            
            <div class="input-group">
                <label>Node Label</label>
                <input type="text" id="room-name-field" placeholder="Design-Team">
            </div>
            <div class="input-group">
                <label>Security Key</label>
                <input type="password" id="room-pass-field" placeholder="••••••••">
            </div>

            <p id="room-error" class="error-text">Invalid credentials</p>

            <div style="display: flex; gap: 10px; margin-top: 25px;">
                <button class="btn" style="color: var(--text-muted)" onclick="closeRoomModal()">Cancel</button>
                <button class="btn btn-primary" id="modal-confirm-btn" onclick="handleRoomAction()">Confirm</button>
            </div>
        </div>
    </div>

    <script>
        // Icons in SVG format for Favicon
        const ICON_MAIL = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>`;
        const ICON_CHAT = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7.9 20A9 9 0 1 0 4 16.1L2 22Z"/></svg>`;

        function updateFavicon(type) {
            const svg = type === 'mail' ? ICON_MAIL : ICON_CHAT;
            const blob = new Blob([svg], {type: 'image/svg+xml'});
            const url = URL.createObjectURL(blob);
            document.getElementById('dynamic-favicon').href = url;
        }

        // State Management
        let accounts = JSON.parse(localStorage.getItem('cp_users') || '[]');
        let rooms = JSON.parse(localStorage.getItem('cp_nodes') || '[]');
        let chats = JSON.parse(localStorage.getItem('cp_chats') || '{}');
        let currentUser = null;
        let activeRoom = null;
        let modalMode = 'join'; // or 'create'
        let selectedSeed = 'Jasper';

        // Initialize
        window.onload = () => {
            renderAvatarGrid();
            checkSession();
            lucide.createIcons();
            updateFavicon('mail'); // Default favicon
        };

        function checkSession() {
            const saved = localStorage.getItem('cp_active_user');
            if (saved) {
                currentUser = accounts.find(a => a.user === saved);
                if (currentUser) {
                    showApp();
                    return;
                }
            }
            showLogin();
        }

        // Auth Logic
        function showLogin() {
            document.getElementById('auth-overlay').classList.remove('hidden');
            document.getElementById('login-form').classList.remove('hidden');
            document.getElementById('register-form').classList.add('hidden');
            
            const list = document.getElementById('account-list');
            list.innerHTML = accounts.map(acc => `
                <div onclick="loginAs('${acc.user}')" style="display: flex; align-items: center; gap: 15px; padding: 12px 20px; background: #f8fafc; border-radius: 1rem; cursor: pointer; border: 1px solid #e2e8f0;">
                    <img src="${acc.avatar}" style="width: 32px; height: 32px; border-radius: 8px; background: white;">
                    <div style="text-align: left">
                        <div style="font-weight: 800; font-size: 14px; color: var(--text-dark)">${acc.name}</div>
                        <div style="font-size: 10px; color: var(--text-muted); font-weight: 700;">@${acc.user}</div>
                    </div>
                </div>
            `).join('');
        }

        function showRegister() {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('register-form').classList.remove('hidden');
        }

        function renderAvatarGrid() {
            const seeds = ['Jasper', 'Misty', 'Felix', 'Bella', 'Simba', 'Oliver', 'Cleo', 'Max'];
            const grid = document.getElementById('avatar-grid');
            grid.innerHTML = seeds.map(s => `
                <div class="avatar-item ${s === selectedSeed ? 'active' : ''}" onclick="selectSeed('${s}', this)">
                    <img src="https://api.dicebear.com/7.x/notionists/svg?seed=${s}">
                </div>
            `).join('');
        }

        window.selectSeed = (s, el) => {
            selectedSeed = s;
            document.querySelectorAll('.avatar-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        };

        function handleRegister() {
            const name = document.getElementById('reg-name').value.trim();
            const user = document.getElementById('reg-user').value.trim().toLowerCase();
            if(!name || !user) return;
            
            const avatar = `https://api.dicebear.com/7.x/notionists/svg?seed=${selectedSeed}`;
            const newUser = { name, user, avatar };
            accounts.push(newUser);
            localStorage.setItem('cp_users', JSON.stringify(accounts));
            loginAs(user);
        }

        function loginAs(username) {
            currentUser = accounts.find(a => a.user === username);
            localStorage.setItem('cp_active_user', username);
            showApp();
        }

        function logout() {
            localStorage.removeItem('cp_active_user');
            location.reload();
        }

        function showApp() {
            document.getElementById('auth-overlay').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('header-name').textContent = currentUser.name;
            document.getElementById('header-avatar').src = currentUser.avatar;
            renderRooms();
            lucide.createIcons();
            updateFavicon('mail');
        }

        // Room Logic
        function openRoomModal(mode) {
            modalMode = mode;
            document.getElementById('modal-container').classList.remove('hidden');
            document.getElementById('modal-title').textContent = mode === 'create' ? 'Create New Node' : 'Join Existing Node';
            document.getElementById('modal-confirm-btn').textContent = mode === 'create' ? 'Launch Node' : 'Connect';
            document.getElementById('room-error').style.display = 'none';
        }

        function closeRoomModal() {
            document.getElementById('modal-container').classList.add('hidden');
            document.getElementById('room-name-field').value = '';
            document.getElementById('room-pass-field').value = '';
        }

        function handleRoomAction() {
            const name = document.getElementById('room-name-field').value.trim();
            const pass = document.getElementById('room-pass-field').value.trim();
            if(!name || !pass) return;

            if(modalMode === 'create') {
                const id = 'r_' + Date.now();
                const newRoom = { id, name, pass };
                rooms.push(newRoom);
                chats[id] = [];
                localStorage.setItem('cp_nodes', JSON.stringify(rooms));
                localStorage.setItem('cp_chats', JSON.stringify(chats));
                selectRoom(id);
                closeRoomModal();
            } else {
                const found = rooms.find(r => r.name.toLowerCase() === name.toLowerCase() && r.pass === pass);
                if(found) {
                    selectRoom(found.id);
                    closeRoomModal();
                } else {
                    document.getElementById('room-error').style.display = 'block';
                }
            }
        }

        function renderRooms() {
            const list = document.getElementById('rooms-list');
            list.innerHTML = rooms.map(r => `
                <div class="room-item ${activeRoom?.id === r.id ? 'active' : ''}" onclick="selectRoom('${r.id}')">
                    <i data-lucide="hash" style="width: 14px"></i>
                    ${r.name}
                </div>
            `).join('');
            lucide.createIcons();
        }

        function selectRoom(id) {
            activeRoom = rooms.find(r => r.id === id);
            document.getElementById('chat-empty').classList.add('hidden');
            document.getElementById('chat-active').classList.remove('hidden');
            document.getElementById('active-room-title').textContent = activeRoom.name;
            renderRooms();
            renderMessages();
            updateFavicon('chat'); // Switch to chat icon when a room is active
        }

        function setMode(mode) {
            if (mode === 'chat') {
                activeRoom = null;
                document.getElementById('chat-empty').classList.remove('hidden');
                document.getElementById('chat-active').classList.add('hidden');
                renderRooms();
                updateFavicon('mail'); // Back to mail when viewing channel list
            }
        }

        // Messaging Logic
        function renderMessages() {
            const container = document.getElementById('messages');
            container.innerHTML = '';
            const roomMsgs = chats[activeRoom.id] || [];
            
            roomMsgs.forEach(m => {
                const isMe = m.user === currentUser.user;
                const div = document.createElement('div');
                div.className = `msg ${isMe ? 'me' : 'them'}`;
                div.innerHTML = `
                    <div class="msg-info">${isMe ? 'You' : m.name}</div>
                    <div>${m.text}</div>
                `;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if(!text || !activeRoom) return;

            if(!chats[activeRoom.id]) chats[activeRoom.id] = [];
            
            chats[activeRoom.id].push({
                user: currentUser.user,
                name: currentUser.name,
                text: text,
                time: new Date().toLocaleTimeString()
            });

            localStorage.setItem('cp_chats', JSON.stringify(chats));
            input.value = '';
            renderMessages();
        }

        document.getElementById('chat-input').addEventListener('keypress', (e) => {
            if(e.key === 'Enter') sendMessage();
        });

    </script>
</body>
</html>
