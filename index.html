<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Chadwick</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js" type="module"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .message-bubble { max-width: 80%; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-sky-50 text-gray-900 overflow-hidden">

    <!-- Login Overlay -->
    <div id="login-overlay" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-sky-50">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md text-center border border-sky-100">
            <div class="flex justify-center mb-6">
                <div class="bg-sky-600 p-5 rounded-full text-white shadow-xl">
                    <svg viewBox="0 0 100 100" class="w-16 h-16" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M10,60 C10,40 30,20 60,20 C75,20 85,30 90,45 C80,35 65,30 50,35 C35,40 25,55 25,70 C25,80 30,85 35,90 L20,95 L25,85 C15,80 10,70 10,60 Z" fill="currentColor" />
                        <circle cx="65" cy="35" r="3" fill="white" />
                    </svg>
                </div>
            </div>
            <h1 class="text-3xl font-extrabold text-sky-900 mb-2">Connect Chadwick</h1>
            <p class="text-sky-500 mb-8 font-medium">Safe & friendly conversations</p>
            
            <form id="login-form" class="space-y-5">
                <div class="text-left">
                    <label class="block text-sm font-semibold text-gray-600 mb-2 ml-1">Your Name</label>
                    <input 
                        type="text" 
                        id="display-name-input"
                        placeholder="How should others see you?"
                        class="w-full px-5 py-4 rounded-2xl bg-gray-50 border-2 border-transparent focus:bg-white focus:border-sky-400 focus:ring-0 outline-none transition-all text-gray-800 disabled:opacity-50"
                        required
                    >
                </div>
                <button 
                    type="submit" 
                    id="join-btn"
                    class="w-full bg-sky-600 hover:bg-sky-700 text-white font-bold py-4 rounded-2xl transition-all shadow-lg active:scale-95 flex items-center justify-center gap-2 disabled:opacity-50"
                >
                    Join the Community
                </button>
                <p id="auth-status-msg" class="text-xs text-sky-400 mt-2 italic"></p>
            </form>
        </div>
    </div>

    <!-- Main App UI -->
    <div id="app-container" class="flex h-screen bg-gray-50 hidden">
        <!-- Sidebar -->
        <div id="sidebar" class="w-full md:w-80 flex flex-col bg-white border-r border-gray-200">
            <div class="p-5 bg-sky-600 text-white flex items-center justify-between shadow-md">
                <div class="flex items-center gap-3">
                    <svg viewBox="0 0 100 100" class="w-8 h-8" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M10,60 C10,40 30,20 60,20 C75,20 85,30 90,45 C80,35 65,30 50,35 C35,40 25,55 25,70 C25,80 30,85 35,90 L20,95 L25,85 C15,80 10,70 10,60 Z" fill="currentColor" />
                        <circle cx="65" cy="35" r="3" fill="white" />
                    </svg>
                    <span class="font-bold text-xl tracking-tight">Connect</span>
                </div>
                <button id="change-name-btn" class="p-2 hover:bg-sky-500 rounded-xl transition-colors" title="Change Name">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>
                </button>
            </div>

            <div class="p-4">
                <div class="relative">
                    <svg class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    <input 
                        type="text" 
                        id="search-input"
                        placeholder="Find a friend..."
                        class="w-full pl-11 pr-4 py-3 bg-gray-100 rounded-2xl border-none focus:ring-2 focus:ring-sky-400 text-sm outline-none transition-all"
                    >
                </div>
            </div>

            <div id="contacts-list" class="flex-1 overflow-y-auto px-3 custom-scrollbar">
                <!-- Contacts will be listed right here -->
            </div>

            <div class="p-4 border-t border-gray-100 bg-white flex items-center gap-4">
                <div id="user-avatar" class="w-10 h-10 rounded-full bg-sky-600 text-white flex items-center justify-center font-bold shadow-md">?</div>
                <div class="flex-1 truncate">
                    <p id="user-name-display" class="text-sm font-bold text-gray-800 truncate">User</p>
                    <div class="flex items-center gap-1">
                        <span class="w-2 h-2 bg-green-500 rounded-full"></span>
                        <p class="text-[10px] text-gray-500 font-bold uppercase tracking-wider">Active</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Chat Area -->
        <div id="chat-area" class="hidden md:flex flex-1 flex-col bg-white">
            <div id="chat-placeholder" class="flex-1 flex flex-col items-center justify-center p-12 text-center">
                <div class="bg-sky-50 p-12 rounded-full mb-8 shadow-inner">
                    <svg viewBox="0 0 100 100" class="w-32 h-32 text-sky-400" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M10,60 C10,40 30,20 60,20 C75,20 85,30 90,45 C80,35 65,30 50,35 C35,40 25,55 25,70 C25,80 30,85 35,90 L20,95 L25,85 C15,80 10,70 10,60 Z" fill="currentColor" />
                        <circle cx="65" cy="35" r="3" fill="white" />
                    </svg>
                </div>
                <h3 class="text-2xl font-black text-gray-800 mb-3">Welcome to Connect Chadwick</h3>
                <p class="max-w-xs text-gray-500 font-medium">Search for friends on the left to start a safe conversation.</p>
            </div>

            <div id="active-chat" class="hidden flex flex-col h-full">
                <div class="p-4 border-b border-gray-100 flex items-center gap-4 bg-white/80 backdrop-blur-md sticky top-0 z-10">
                    <button id="back-btn" class="md:hidden p-2 hover:bg-gray-100 rounded-xl text-gray-600">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                    </button>
                    <div id="chat-header-avatar" class="w-10 h-10 rounded-full bg-sky-100 text-sky-600 flex items-center justify-center font-bold">?</div>
                    <div>
                        <h2 id="chat-header-name" class="font-bold text-gray-900 leading-tight">Friend</h2>
                        <p class="text-[10px] font-bold text-green-500 uppercase tracking-widest">Connected</p>
                    </div>
                </div>

                <div id="messages-container" class="flex-1 overflow-y-auto p-5 space-y-4 bg-sky-50/20 custom-scrollbar">
                    <!-- Messages will be added here -->
                </div>

                <div class="p-4 border-t border-gray-100 bg-white">
                    <form id="message-form" class="flex items-center gap-3">
                        <input 
                            type="text" 
                            id="message-input"
                            placeholder="Type a message..."
                            class="flex-1 px-5 py-4 bg-gray-50 rounded-2xl border-2 border-transparent focus:bg-white focus:border-sky-400 outline-none transition-all text-sm font-medium"
                        >
                        <button 
                            type="submit"
                            class="p-4 bg-sky-600 text-white rounded-2xl hover:bg-sky-700 shadow-lg transition-all active:scale-95"
                        >
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, updateProfile } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, doc, setDoc, getDoc, onSnapshot, addDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'connect-chadwick-html';

        let currentUser = null;
        let activeChatId = null;
        let activeOtherUser = null;
        let allUsers = [];
        let unsubMessages = null;
        let isAuthProcessing = false;

        const loginOverlay = document.getElementById('login-overlay');
        const appContainer = document.getElementById('app-container');
        const loginForm = document.getElementById('login-form');
        const displayNameInput = document.getElementById('display-name-input');
        const joinBtn = document.getElementById('join-btn');
        const authStatusMsg = document.getElementById('auth-status-msg');
        const contactsList = document.getElementById('contacts-list');
        const chatPlaceholder = document.getElementById('chat-placeholder');
        const activeChatUI = document.getElementById('active-chat');
        const messagesContainer = document.getElementById('messages-container');
        const messageForm = document.getElementById('message-form');
        const messageInput = document.getElementById('message-input');
        const searchInput = document.getElementById('search-input');
        const userNameDisplay = document.getElementById('user-name-display');
        const userAvatar = document.getElementById('user-avatar');
        const changeNameBtn = document.getElementById('change-name-btn');
        const sidebar = document.getElementById('sidebar');
        const chatArea = document.getElementById('chat-area');
        const backBtn = document.getElementById('back-btn');

        // --- Authentication Logic ---
        async function ensureAuth() {
            if (auth.currentUser) return auth.currentUser;
            
            isAuthProcessing = true;
            authStatusMsg.textContent = "Connecting to safe server...";
            
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
                return auth.currentUser;
            } catch (error) {
                console.error("Auth error:", error);
                authStatusMsg.textContent = "Connection failed. Please refresh.";
                return null;
            } finally {
                isAuthProcessing = false;
            }
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                authStatusMsg.textContent = "";
                const userDoc = await getDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', user.uid));
                if (userDoc.exists()) {
                    currentUser = { ...user, profileName: userDoc.data().displayName };
                    showMainUI();
                } else {
                    currentUser = user;
                    // User is signed in but hasn't set a name yet
                    loginOverlay.classList.remove('hidden');
                    appContainer.classList.add('hidden');
                }
            }
        });

        function showMainUI() {
            loginOverlay.classList.add('hidden');
            appContainer.classList.remove('hidden');
            userNameDisplay.textContent = currentUser.profileName;
            userAvatar.textContent = currentUser.profileName.charAt(0).toUpperCase();
            syncData();
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = displayNameInput.value.trim();
            if (!name || isAuthProcessing) return;

            joinBtn.disabled = true;
            joinBtn.textContent = "Joining...";

            const user = await ensureAuth();
            if (!user) {
                joinBtn.disabled = false;
                joinBtn.textContent = "Join the Community";
                return;
            }

            try {
                await updateProfile(user, { displayName: name });
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', user.uid), {
                    displayName: name,
                    uid: user.uid,
                    lastSeen: serverTimestamp()
                }, { merge: true });

                currentUser = { ...user, profileName: name };
                showMainUI();
            } catch (err) {
                console.error("Profile update error:", err);
                authStatusMsg.textContent = "Error setting name. Try again.";
            } finally {
                joinBtn.disabled = false;
                joinBtn.textContent = "Join the Community";
            }
        });

        changeNameBtn.addEventListener('click', () => {
            displayNameInput.value = currentUser.profileName;
            loginOverlay.classList.remove('hidden');
            appContainer.classList.add('hidden');
        });

        // --- Data Syncing ---
        function syncData() {
            if (!currentUser) return;

            // Sync All Users (for search/new chats)
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'users'), (snapshot) => {
                allUsers = snapshot.docs.map(d => d.data()).filter(u => u.uid !== currentUser.uid);
                renderContacts();
            }, (err) => console.error("User list sync error:", err));

            // Sync My Conversations
            onSnapshot(collection(db, 'artifacts', appId, 'users', currentUser.uid, 'conversations'), (snapshot) => {
                const chats = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                renderContacts(chats);
            }, (err) => console.error("Chat list sync error:", err));
        }

        function renderContacts(chats = []) {
            const query = searchInput.value.toLowerCase().trim();
            contactsList.innerHTML = '';

            // If searching, show users from allUsers. Otherwise show existing chats.
            const itemsToRender = query 
                ? allUsers.filter(u => u.displayName.toLowerCase().includes(query))
                : chats;

            if (itemsToRender.length === 0) {
                contactsList.innerHTML = `<p class="text-center py-8 text-gray-400 text-sm font-medium">No one found yet.</p>`;
                return;
            }

            itemsToRender.forEach(item => {
                const name = item.displayName || item.otherUserName;
                const uid = item.uid || item.otherUserId;
                const isExistingChat = !!item.otherUserId;

                const btn = document.createElement('button');
                btn.className = `w-full flex items-center gap-4 p-3 rounded-2xl transition-all text-left mb-2 hover:bg-sky-50`;
                btn.innerHTML = `
                    <div class="w-12 h-12 rounded-full ${isExistingChat ? 'bg-sky-600 text-white' : 'bg-sky-100 text-sky-600'} flex items-center justify-center font-bold text-lg">
                        ${name ? name.charAt(0).toUpperCase() : '?'}
                    </div>
                    <div class="flex-1 overflow-hidden">
                        <div class="font-bold text-gray-800 truncate">${name}</div>
                        <div class="text-xs text-gray-500 font-medium">${isExistingChat ? 'Continue chat' : 'Start chatting'}</div>
                    </div>
                `;
                btn.onclick = () => selectChat(uid, name);
                contactsList.appendChild(btn);
            });
        }

        async function selectChat(otherUid, otherName) {
            const chatId = [currentUser.uid, otherUid].sort().join('_');
            activeChatId = chatId;
            activeOtherUser = { uid: otherUid, displayName: otherName };

            // Update conversations for both parties (RULE 1)
            const myConvRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'conversations', chatId);
            const theirConvRef = doc(db, 'artifacts', appId, 'users', otherUid, 'conversations', chatId);
            
            try {
                await setDoc(myConvRef, { otherUserId: otherUid, otherUserName: otherName, lastUpdate: serverTimestamp() }, { merge: true });
                await setDoc(theirConvRef, { otherUserId: currentUser.uid, otherUserName: currentUser.profileName, lastUpdate: serverTimestamp() }, { merge: true });
            } catch (e) {
                console.error("Conversation creation error:", e);
            }

            // UI Adjustments
            chatPlaceholder.classList.add('hidden');
            activeChatUI.classList.remove('hidden');
            document.getElementById('chat-header-name').textContent = otherName;
            document.getElementById('chat-header-avatar').textContent = otherName.charAt(0).toUpperCase();

            // Mobile view switch
            if (window.innerWidth < 768) {
                sidebar.classList.add('hidden');
                chatArea.classList.remove('hidden');
                chatArea.classList.add('flex');
            }

            syncMessages(chatId);
        }

        function syncMessages(chatId) {
            if (unsubMessages) unsubMessages();
            
            unsubMessages = onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'messages', chatId, 'list'), (snapshot) => {
                const msgs = snapshot.docs.map(d => d.data());
                msgs.sort((a, b) => (a.timestamp?.seconds || 0) - (b.timestamp?.seconds || 0));
                
                messagesContainer.innerHTML = '';
                if (msgs.length === 0) {
                    messagesContainer.innerHTML = `<div class="text-center py-12 text-gray-400 text-sm">Safe chat started. Say hello!</div>`;
                }

                msgs.forEach(msg => {
                    const isMine = msg.senderId === currentUser.uid;
                    const div = document.createElement('div');
                    div.className = `flex ${isMine ? 'justify-end' : 'justify-start'}`;
                    div.innerHTML = `
                        <div class="message-bubble px-4 py-3 rounded-2xl shadow-sm text-sm ${isMine ? 'bg-sky-600 text-white rounded-tr-none' : 'bg-white text-gray-800 rounded-tl-none border border-gray-100'}">
                            ${!isMine ? `<p class="text-[10px] font-bold text-sky-500 mb-1 uppercase tracking-tight">${msg.senderName}</p>` : ''}
                            <p class="leading-relaxed font-medium">${msg.text}</p>
                        </div>
                    `;
                    messagesContainer.appendChild(div);
                });
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }, (err) => console.error("Message sync error:", err));
        }

        messageForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = messageInput.value.trim();
            if (!text || !activeChatId) return;

            messageInput.value = '';
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'messages', activeChatId, 'list'), {
                    text,
                    senderId: currentUser.uid,
                    senderName: currentUser.profileName,
                    timestamp: serverTimestamp()
                });
            } catch (err) {
                console.error("Message send error:", err);
            }
        });

        searchInput.addEventListener('input', () => renderContacts());
        
        backBtn.addEventListener('click', () => {
            sidebar.classList.remove('hidden');
            chatArea.classList.add('hidden');
            chatArea.classList.remove('flex');
            activeChatId = null;
        });

        // Initialize background auth immediately
        ensureAuth();
    </script>
</body>
</html>
