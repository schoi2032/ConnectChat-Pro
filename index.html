<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConnectChat | Mesh P2P</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --brand: #6366f1;
            --brand-light: #a855f7;
            --brand-gradient: linear-gradient(135deg, var(--brand) 0%, var(--brand-light) 100%);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
            -webkit-font-smoothing: antialiased;
        }

        .logo-mark {
            position: relative;
            width: 64px;
            height: 64px;
            background: #0f172a;
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        .node-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 2px solid var(--brand);
            border-radius: 22px;
            animation: ring-pulse 2s infinite ease-out;
            opacity: 0;
        }

        @keyframes ring-pulse {
            0% { transform: scale(0.6); opacity: 1; }
            100% { transform: scale(1.4); opacity: 0; }
        }

        .bubble {
            max-width: 85%;
            padding: 12px 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .bubble-me {
            background: var(--brand-gradient);
            color: white;
            border-radius: 20px 20px 4px 20px;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
        }

        .bubble-them {
            background: white;
            color: #1e293b;
            border-radius: 20px 20px 20px 4px;
            border: 1px solid #e2e8f0;
        }

        #toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }
        #toast.visible { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body class="h-screen overflow-hidden flex flex-col bg-slate-50">

    <div id="toast" class="bg-slate-900 text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-4 min-w-[280px]">
        <div class="w-8 h-8 bg-indigo-500 rounded-full flex items-center justify-center text-[10px]"><i class="fas fa-network-wired"></i></div>
        <span id="toast-msg" class="font-bold text-sm">System Ready</span>
    </div>

    <div id="landing" class="fixed inset-0 z-[200] bg-white flex items-center justify-center p-6 overflow-y-auto">
        <div class="max-w-md w-full text-center py-10">
            <div class="logo-mark mx-auto mb-8">
                <div class="node-ring"></div>
                <i class="fas fa-project-diagram text-indigo-500"></i>
            </div>
            <h1 class="text-3xl font-extrabold tracking-tighter text-slate-900 mb-2">Mesh Chat P2P</h1>
            <p class="text-slate-400 font-medium mb-10 text-sm">Automated P2P Mesh: Choose an ID or go Random.</p>
            <div class="space-y-4 text-left">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2 mb-1 block">Display Name</label>
                    <input type="text" id="name-input" placeholder="e.g. Alex" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl px-6 py-4 focus:border-indigo-500 outline-none font-bold text-lg">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-2 mb-1 block">Custom Node ID (Optional)</label>
                    <input type="text" id="custom-id-input" placeholder="e.g. my-private-room" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl px-6 py-4 focus:border-indigo-500 outline-none font-mono text-sm">
                </div>
                <button id="start-btn" class="w-full bg-indigo-600 text-white font-black py-5 rounded-2xl shadow-lg hover:bg-indigo-700 transition-all">Launch Connection</button>
            </div>
        </div>
    </div>

    <header class="h-20 bg-white border-b border-slate-100 px-6 flex items-center justify-between shrink-0">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center shadow-md">
                <i class="fas fa-users text-white text-sm"></i>
            </div>
            <div>
                <h2 class="font-bold text-slate-900 leading-tight" id="header-name">Offline</h2>
                <div class="flex items-center gap-1.5">
                    <span id="status-light" class="w-2 h-2 bg-red-400 rounded-full"></span>
                    <span id="status-text" class="text-[9px] font-bold text-slate-400 uppercase">Connecting...</span>
                </div>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <div class="bg-indigo-50 px-4 py-2 rounded-xl border border-indigo-100">
                <span class="text-[8px] block font-black text-indigo-400 uppercase">Your Node ID</span>
                <code id="my-id-display" class="text-xs font-bold text-indigo-700">---</code>
            </div>
            <button id="copy-id" class="p-3 bg-white border border-slate-200 rounded-xl text-slate-500 hover:text-indigo-600"><i class="fas fa-copy"></i></button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <aside class="w-72 bg-white border-r border-slate-100 hidden md:flex flex-col p-6 shrink-0">
            <div class="mb-8">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 block">Link New Peer</label>
                <div class="flex gap-2">
                    <input type="text" id="target-id" placeholder="Paste ID" class="flex-1 bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-xs font-mono focus:border-indigo-500 outline-none">
                    <button id="connect-btn" class="w-10 h-10 bg-indigo-600 text-white rounded-xl flex items-center justify-center"><i class="fas fa-plus"></i></button>
                </div>
            </div>
            <div class="flex-1 overflow-y-auto" id="peer-list"></div>
        </aside>

        <section class="flex-1 flex flex-col bg-white">
            <div id="chat-window" class="flex-1 overflow-y-auto px-6 py-8 space-y-4">
                <div id="radar-container" class="h-full flex flex-col items-center justify-center opacity-50">
                    <p class="text-xs font-bold uppercase tracking-widest text-slate-400">Waiting for connection...</p>
                </div>
            </div>
            <footer class="p-4 bg-white border-t">
                <form id="chat-form" class="flex gap-2 max-w-4xl mx-auto">
                    <input type="text" id="chat-input" placeholder="Type to everyone..." class="flex-1 bg-slate-100 rounded-xl px-4 py-3 outline-none">
                    <button type="submit" class="w-12 h-12 bg-slate-900 text-white rounded-xl"><i class="fas fa-paper-plane"></i></button>
                </form>
            </footer>
        </section>
    </main>

    <script>
        let peer = null;
        let connections = new Map();
        let knownNodeIds = new Set();
        let myName = "";
        
        let audioCtx = null;
        function playPop() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.1);
            
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        const els = {
            landing: document.getElementById('landing'),
            startBtn: document.getElementById('start-btn'),
            nameIn: document.getElementById('name-input'),
            customIdIn: document.getElementById('custom-id-input'),
            myId: document.getElementById('my-id-display'),
            targetId: document.getElementById('target-id'),
            connectBtn: document.getElementById('connect-btn'),
            chat: document.getElementById('chat-window'),
            form: document.getElementById('chat-form'),
            input: document.getElementById('chat-input'),
            peerList: document.getElementById('peer-list'),
            statusLight: document.getElementById('status-light'),
            statusText: document.getElementById('status-text'),
            toast: document.getElementById('toast'),
            toastMsg: document.getElementById('toast-msg'),
            radar: document.getElementById('radar-container'),
            headerName: document.getElementById('header-name')
        };

        function notify(msg) {
            els.toastMsg.innerText = msg;
            els.toast.classList.add('visible');
            setTimeout(() => els.toast.classList.remove('visible'), 3000);
        }

        function setupConnection(conn) {
            if (connections.has(conn.peer)) return;

            conn.on('open', () => {
                connections.set(conn.peer, conn);
                knownNodeIds.add(conn.peer);
                conn.send({ 
                    type: 'handshake', 
                    name: myName, 
                    mesh: Array.from(knownNodeIds) 
                });
                updateUI();
                notify("Mesh Node Linked");
            });

            conn.on('data', (data) => {
                if (data.type === 'handshake') {
                    conn.peerName = data.name;
                    if (data.mesh) {
                        data.mesh.forEach(id => {
                            if (id !== peer.id && !connections.has(id)) {
                                setupConnection(peer.connect(id));
                            }
                        });
                    }
                    updateUI();
                } else {
                    playPop();
                    addMessage(conn.peerName || "Peer", data, "them");
                }
            });

            conn.on('close', () => { connections.delete(conn.peer); updateUI(); });
            conn.on('error', () => { connections.delete(conn.peer); updateUI(); });
        }

        function addMessage(sender, text, type) {
            if (!els.radar) return;
            els.radar.style.display = 'none';
            const div = document.createElement('div');
            div.className = `flex flex-col ${type === 'me' ? 'items-end' : 'items-start'}`;
            const safeText = text.toString().replace(/</g, "&lt;");
            div.innerHTML = `
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1 px-1">${sender}</span>
                <div class="bubble ${type === 'me' ? 'bubble-me' : 'bubble-them'} shadow-sm animate-in zoom-in-95 duration-200">${safeText}</div>
            `;
            els.chat.appendChild(div);
            els.chat.scrollTop = els.chat.scrollHeight;
        }

        function updateUI() {
            let html = '';
            connections.forEach(c => {
                html += `<div class="p-3 bg-slate-50 border rounded-xl text-xs font-bold mb-2 flex items-center justify-between">
                    <span>${c.peerName || 'Node...'}</span>
                    <div class="w-2 h-2 bg-emerald-500 rounded-full shadow-lg shadow-emerald-200"></div>
                </div>`;
            });
            els.peerList.innerHTML = html || '<p class="text-[10px] text-slate-300">No active links</p>';
            els.statusLight.className = connections.size > 0 ? "w-2 h-2 bg-emerald-500 rounded-full animate-pulse" : "w-2 h-2 bg-indigo-400 rounded-full";
            els.statusText.innerText = connections.size > 0 ? `${connections.size} Active in Mesh` : "Online - Standalone";
        }

        function startSession(name, id) {
            myName = name;
            els.headerName.innerText = name;
            els.landing.style.display = 'none';

            peer = new Peer(id || undefined, {
                debug: 1,
                config: { 'iceServers': [{ url: 'stun:stun.l.google.com:19302' }] }
            });

            peer.on('open', (newId) => { 
                els.myId.innerText = newId; 
                knownNodeIds.add(newId);
                notify("P2P Node Active");
            });

            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    alert("That Node ID is already taken! Try another one.");
                    window.location.reload();
                } else {
                    console.error(err);
                }
            });

            peer.on('connection', setupConnection);
            peer.on('disconnected', () => peer.reconnect());
        }

        els.startBtn.onclick = () => {
            const name = els.nameIn.value.trim();
            const customId = els.customIdIn.value.trim();
            if (!name) return alert("Nickname required");
            startSession(name, customId);
        };

        els.connectBtn.onclick = () => {
            const target = els.targetId.value.trim();
            if (target && peer && target !== peer.id) {
                setupConnection(peer.connect(target));
                els.targetId.value = '';
            }
        };

        els.form.onsubmit = (e) => {
            e.preventDefault();
            const msg = els.input.value.trim();
            if (!msg) return;
            connections.forEach(c => { if (c.open) c.send(msg); });
            addMessage(myName, msg, "me");
            els.input.value = '';
        };

        document.getElementById('copy-id').onclick = () => {
            const text = els.myId.innerText;
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            notify("ID Copied!");
        };

        setInterval(() => {
            connections.forEach((c, id) => { if (!c.open) connections.delete(id); });
            updateUI();
        }, 5000);
    </script>
</body>
</html>
