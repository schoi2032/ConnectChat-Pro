<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConnectChat | Persistent Mesh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, query, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Global State
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'connect-chat-v2';

        let peer = null;
        let myId = null;
        let myName = "";
        let currentRoom = "";
        const connections = new Map();

        const els = {
            landing: document.getElementById('landing'),
            chatSection: document.getElementById('chat-section'),
            nameIn: document.getElementById('name-input'),
            roomIn: document.getElementById('room-input'),
            startBtn: document.getElementById('start-btn'),
            chatWindow: document.getElementById('chat-window'),
            chatForm: document.getElementById('chat-form'),
            chatInput: document.getElementById('chat-input'),
            peerList: document.getElementById('peer-list'),
            roomDisplay: document.getElementById('room-display'),
            toast: document.getElementById('toast'),
            toastMsg: document.getElementById('toast-msg')
        };

        function notify(msg) {
            els.toastMsg.innerText = msg;
            els.toast.classList.add('visible');
            setTimeout(() => els.toast.classList.remove('visible'), 3000);
        }

        async function initMesh(name, room) {
            myName = name;
            currentRoom = room.toLowerCase().trim() || "global";
            els.roomDisplay.innerText = currentRoom;
            
            // 1. Sign in
            const userCred = await signInAnonymously(auth);
            const userId = userCred.user.uid;

            // 2. Initialize PeerJS
            peer = new Peer(userId, {
                debug: 1,
                config: { 'iceServers': [{ url: 'stun:stun.l.google.com:19302' }] }
            });

            peer.on('open', (id) => {
                myId = id;
                registerPresence(id);
                listenForPeers();
                els.landing.classList.add('hidden');
                els.chatSection.classList.remove('hidden');
                notify("Connected to Mesh");
            });

            peer.on('connection', (conn) => setupConnection(conn));
            
            peer.on('error', (err) => {
                console.error("Peer Error:", err);
                if (err.type === 'peer-unavailable') return;
                notify("Connection issue. Retrying...");
            });
        }

        // 3. Presence Logic: Register self in the room so others can find you
        async function registerPresence(peerId) {
            const presenceDoc = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoom, 'peers', peerId);
            await setDoc(presenceDoc, {
                name: myName,
                lastSeen: serverTimestamp()
            });

            // Heartbeat to stay "alive" forever
            setInterval(async () => {
                await setDoc(presenceDoc, { name: myName, lastSeen: serverTimestamp() }, { merge: true });
            }, 20000);

            // Cleanup on tab close
            window.addEventListener('beforeunload', () => {
                deleteDoc(presenceDoc);
            });
        }

        // 4. Discovery Logic: Listen for anyone else entering the same Room ID
        function listenForPeers() {
            const peersRef = collection(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoom, 'peers');
            onSnapshot(peersRef, (snapshot) => {
                snapshot.docChanges().forEach((change) => {
                    const peerData = change.doc.data();
                    const peerId = change.doc.id;

                    if (change.type === "added" && peerId !== myId && !connections.has(peerId)) {
                        // Connect to new person in room
                        const conn = peer.connect(peerId);
                        setupConnection(conn);
                    }
                });
            }, (err) => console.error("Firestore Listen Error:", err));
        }

        function setupConnection(conn) {
            if (connections.has(conn.peer)) return;

            conn.on('open', () => {
                connections.set(conn.peer, conn);
                conn.send({ type: 'handshake', name: myName });
                updatePeerUI();
            });

            conn.on('data', (data) => {
                if (data.type === 'handshake') {
                    conn.peerName = data.name;
                    updatePeerUI();
                } else if (data.type === 'chat') {
                    addMessage(data.sender, data.text, 'them');
                }
            });

            conn.on('close', () => {
                connections.delete(conn.peer);
                updatePeerUI();
            });
        }

        function updatePeerUI() {
            let html = '';
            connections.forEach(c => {
                html += `<div class="flex items-center gap-2 p-2 bg-slate-50 rounded-lg mb-2">
                    <div class="w-2 h-2 bg-green-500 rounded-full"></div>
                    <span class="text-xs font-bold text-slate-700">${c.peerName || 'Connecting...'}</span>
                </div>`;
            });
            els.peerList.innerHTML = html || '<p class="text-[10px] text-slate-400">Waiting for others to join room...</p>';
        }

        function addMessage(sender, text, type) {
            const div = document.createElement('div');
            div.className = `flex flex-col ${type === 'me' ? 'items-end' : 'items-start'} mb-4`;
            div.innerHTML = `
                <span class="text-[10px] font-bold text-slate-400 px-2">${sender}</span>
                <div class="max-w-[80%] p-3 rounded-2xl ${type === 'me' ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-800'}">
                    ${text.replace(/</g, "&lt;")}
                </div>
            `;
            els.chatWindow.appendChild(div);
            els.chatWindow.scrollTop = els.chatWindow.scrollHeight;
        }

        els.startBtn.onclick = () => {
            const name = els.nameIn.value.trim();
            const room = els.roomIn.value.trim();
            if (!name || !room) return alert("Enter Name and Room ID");
            initMesh(name, room);
        };

        els.chatForm.onsubmit = (e) => {
            e.preventDefault();
            const msg = els.chatInput.value.trim();
            if (!msg) return;

            connections.forEach(c => {
                if (c.open) c.send({ type: 'chat', sender: myName, text: msg });
            });

            addMessage(myName, msg, 'me');
            els.chatInput.value = '';
        };

    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        #toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
            transition: 0.4s; z-index: 1000;
        }
        #toast.visible { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body class="bg-slate-50 h-screen overflow-hidden">

    <div id="toast" class="bg-slate-900 text-white px-6 py-3 rounded-full shadow-2xl flex items-center gap-3">
        <div class="w-2 h-2 bg-indigo-500 rounded-full animate-pulse"></div>
        <span id="toast-msg" class="text-sm font-bold">Connecting...</span>
    </div>

    <!-- Login -->
    <div id="landing" class="fixed inset-0 z-50 bg-white flex items-center justify-center p-6">
        <div class="max-w-sm w-full text-center">
            <div class="w-16 h-16 bg-indigo-600 rounded-2xl mx-auto mb-6 flex items-center justify-center shadow-xl shadow-indigo-200">
                <i class="fas fa-tower-broadcast text-white text-2xl"></i>
            </div>
            <h1 class="text-2xl font-black text-slate-900 mb-2">Mesh Network</h1>
            <p class="text-slate-400 text-sm mb-8 font-medium">Enter the same Room ID to find each other automatically.</p>
            <div class="space-y-4">
                <input type="text" id="name-input" placeholder="Your Name" class="w-full bg-slate-50 border-2 border-slate-100 rounded-xl px-5 py-4 focus:border-indigo-500 outline-none font-semibold">
                <input type="text" id="room-input" placeholder="Room ID (e.g. pizza-party)" class="w-full bg-slate-50 border-2 border-slate-100 rounded-xl px-5 py-4 focus:border-indigo-500 outline-none font-mono">
                <button id="start-btn" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-indigo-700 transition-all">Join Mesh</button>
            </div>
        </div>
    </div>

    <!-- App -->
    <div id="chat-section" class="hidden h-screen flex flex-col md:flex-row">
        <!-- Sidebar -->
        <aside class="w-full md:w-64 bg-white border-r border-slate-200 p-6 flex flex-col shrink-0">
            <div class="mb-6">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-1">Room ID</label>
                <div class="bg-indigo-50 text-indigo-700 font-mono text-sm font-bold px-3 py-2 rounded-lg" id="room-display">---</div>
            </div>
            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-3">Connected Nodes</label>
            <div id="peer-list" class="flex-1 overflow-y-auto"></div>
        </aside>

        <!-- Main Chat -->
        <main class="flex-1 flex flex-col bg-white">
            <div id="chat-window" class="flex-1 overflow-y-auto p-6 scroll-smooth">
                <div class="h-full flex flex-col items-center justify-center text-center opacity-30">
                    <i class="fas fa-comments text-4xl mb-4"></i>
                    <p class="font-bold">Chat history starts here</p>
                </div>
            </div>
            <div class="p-4 border-t border-slate-100">
                <form id="chat-form" class="flex gap-2">
                    <input type="text" id="chat-input" placeholder="Type a message..." class="flex-1 bg-slate-100 rounded-xl px-5 py-3 outline-none focus:ring-2 focus:ring-indigo-500/20 focus:bg-white">
                    <button class="w-12 h-12 bg-indigo-600 text-white rounded-xl shadow-md flex items-center justify-center hover:bg-indigo-700"><i class="fas fa-paper-plane"></i></button>
                </form>
            </div>
        </main>
    </div>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</body>
</html>
