<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P GroupMerge Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/lucide.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 h-screen overflow-hidden">

    <div id="app" class="flex flex-col h-full">
        <!-- Header -->
        <header class="bg-white border-b p-4 flex justify-between items-center shadow-sm shrink-0">
            <div class="flex items-center gap-2 text-emerald-600">
                <i data-lucide="shield-check" class="w-6 h-6"></i>
                <h1 class="text-xl font-bold tracking-tight">P2P Group Chat</h1>
            </div>
            <div class="bg-emerald-50 px-3 py-1 rounded-full flex items-center gap-2 text-emerald-700 text-sm font-medium border border-emerald-100">
                <i data-lucide="users" class="w-4 h-4"></i>
                <span id="memberCount">1 Online (You)</span>
            </div>
        </header>

        <main class="flex-1 flex flex-col md:flex-row overflow-hidden">
            <!-- Sidebar -->
            <aside class="w-full md:w-80 bg-white border-r flex flex-col p-4 gap-6 overflow-y-auto shrink-0">
                <section class="space-y-3">
                    <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Your P2P Identity</h2>
                    <div class="p-3 bg-slate-50 rounded-lg border border-slate-100 space-y-2">
                        <div class="flex items-center gap-2">
                            <div id="userAvatar" class="w-8 h-8 rounded-full bg-emerald-500 flex items-center justify-center text-white font-bold text-xs">?</div>
                            <span id="userIdDisplay" class="text-sm font-mono text-slate-600 truncate flex-1 italic">Generating ID...</span>
                        </div>
                        <button id="copyBtn" class="w-full flex items-center justify-center gap-2 text-xs py-1.5 bg-white border rounded hover:bg-slate-50 transition-colors">
                            <i data-lucide="copy" class="w-3.5 h-3.5"></i>
                            <span>Copy My ID</span>
                        </button>
                    </div>
                </section>

                <section class="space-y-3">
                    <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Join a Peer</h2>
                    <div class="space-y-2">
                        <input id="joinInput" type="text" placeholder="Paste Peer ID here..." class="w-full p-2.5 text-sm border rounded-lg focus:ring-2 focus:ring-emerald-500 focus:outline-none bg-slate-50">
                        <button id="joinBtn" class="w-full py-2 bg-emerald-600 text-white rounded-lg text-sm font-semibold hover:bg-emerald-700 transition-colors shadow-sm disabled:opacity-50">
                            Connect & Merge
                        </button>
                        <p class="text-[10px] text-slate-400 leading-tight">
                            * Connect to one person, and your whole group will automatically connect to theirs.
                        </p>
                    </div>
                </section>

                <section class="flex-1 space-y-3">
                    <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Connected Peers</h2>
                    <div id="membersList" class="space-y-1">
                        <div class="text-xs text-slate-400 italic p-2">No other peers connected.</div>
                    </div>
                </section>
            </aside>

            <!-- Chat Area -->
            <section class="flex-1 flex flex-col bg-slate-100/50 relative overflow-hidden">
                <div id="messagesContainer" class="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar">
                    <div class="h-full flex flex-col items-center justify-center text-slate-400 space-y-2">
                        <i data-lucide="messages-square" class="w-12 h-12 opacity-20"></i>
                        <p>Waiting for connections...</p>
                    </div>
                </div>

                <form id="chatForm" class="p-4 bg-white border-t flex gap-2 shrink-0">
                    <input id="msgInput" type="text" class="flex-1 p-3 border rounded-xl focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-slate-50" placeholder="Type a message..." disabled>
                    <button type="submit" id="sendBtn" class="bg-emerald-600 text-white p-3 rounded-xl hover:bg-emerald-700 transition-colors shadow-md disabled:opacity-50" disabled>
                        <i data-lucide="send" class="w-5 h-5"></i>
                    </button>
                </form>
            </section>
        </main>
    </div>

    <script>
        // State
        let peer = null;
        let myId = null;
        const connections = new Map(); // peerId -> DataConnection
        const messages = [];

        // UI Selectors
        const userIdDisplay = document.getElementById('userIdDisplay');
        const userAvatar = document.getElementById('userAvatar');
        const copyBtn = document.getElementById('copyBtn');
        const joinInput = document.getElementById('joinInput');
        const joinBtn = document.getElementById('joinBtn');
        const membersList = document.getElementById('membersList');
        const memberCount = document.getElementById('memberCount');
        const messagesContainer = document.getElementById('messagesContainer');
        const chatForm = document.getElementById('chatForm');
        const msgInput = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');

        // Initialization
        window.onload = () => {
            lucide.createIcons();
            initPeer();
        };

        function initPeer() {
            // Create a random short ID or let PeerJS generate one
            peer = new Peer();

            peer.on('open', (id) => {
                myId = id;
                userIdDisplay.textContent = id;
                userAvatar.textContent = id.substring(0, 2).toUpperCase();
                msgInput.disabled = false;
                sendBtn.disabled = false;
                addSystemMessage("Your P2P node is ready.");
            });

            peer.on('connection', (conn) => {
                setupConnection(conn);
            });

            peer.on('error', (err) => {
                console.error("Peer error:", err);
                showStatus("Connection Error", "bg-red-100 text-red-600");
            });
        }

        function setupConnection(conn) {
            conn.on('open', () => {
                if (connections.has(conn.peer)) return;

                connections.set(conn.peer, conn);
                addSystemMessage(`Connected to ${conn.peer.substring(0, 5)}...`);
                updateUI();

                // MERGE LOGIC: Tell the new peer about all my other connections
                // so they can connect to them too (Mesh network)
                const otherPeers = Array.from(connections.keys()).filter(id => id !== conn.peer);
                if (otherPeers.length > 0) {
                    conn.send({ type: 'mesh-update', peers: otherPeers });
                }
            });

            conn.on('data', (data) => {
                if (data.type === 'chat') {
                    renderMessage(data.sender, data.text);
                } else if (data.type === 'mesh-update') {
                    // Try to connect to any new peers I don't know yet
                    data.peers.forEach(peerId => {
                        if (peerId !== myId && !connections.has(peerId)) {
                            const newConn = peer.connect(peerId);
                            setupConnection(newConn);
                        }
                    });
                }
            });

            conn.on('close', () => {
                connections.delete(conn.peer);
                addSystemMessage(`User ${conn.peer.substring(0, 5)} disconnected.`);
                updateUI();
            });
        }

        joinBtn.onclick = () => {
            const targetId = joinInput.value.trim();
            if (!targetId || targetId === myId || connections.has(targetId)) return;

            const conn = peer.connect(targetId);
            setupConnection(conn);
            joinInput.value = '';
        };

        chatForm.onsubmit = (e) => {
            e.preventDefault();
            const text = msgInput.value.trim();
            if (!text) return;

            msgInput.value = '';
            
            // Broadcast to all peers
            const payload = { type: 'chat', sender: myId, text: text };
            connections.forEach(conn => conn.send(payload));

            // Show locally
            renderMessage(myId, text);
        };

        function renderMessage(senderId, text) {
            const isMe = senderId === myId;
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex ${isMe ? 'justify-end' : 'justify-start'} animate-in fade-in slide-in-from-bottom-2 duration-300`;
            
            msgDiv.innerHTML = `
                <div class="max-w-[75%] ${isMe ? 'bg-emerald-600 text-white' : 'bg-white text-slate-800'} p-3 rounded-2xl shadow-sm border ${isMe ? 'border-emerald-500' : 'border-slate-200'}">
                    ${!isMe ? `<p class="text-[10px] font-bold opacity-70 mb-1">PEER-${senderId.substring(0, 4)}</p>` : ''}
                    <p class="text-sm leading-relaxed">${text}</p>
                </div>
            `;

            if (messagesContainer.querySelector('.opacity-20')) {
                messagesContainer.innerHTML = '';
            }

            messagesContainer.appendChild(msgDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function addSystemMessage(text) {
            const div = document.createElement('div');
            div.className = "flex justify-center my-2";
            div.innerHTML = `<span class="bg-slate-200 text-slate-600 px-3 py-1 rounded-full text-[10px] uppercase font-bold tracking-widest">${text}</span>`;
            messagesContainer.appendChild(div);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function updateUI() {
            memberCount.textContent = `${connections.size + 1} Online`;
            
            if (connections.size === 0) {
                membersList.innerHTML = `<div class="text-xs text-slate-400 italic p-2">No other peers connected.</div>`;
            } else {
                membersList.innerHTML = Array.from(connections.keys()).map(id => `
                    <div class="flex items-center gap-2 p-2 hover:bg-slate-50 rounded-md transition-colors">
                        <div class="w-2 h-2 rounded-full bg-slate-300"></div>
                        <span class="text-sm text-slate-700 font-medium truncate">Peer-${id.substring(0, 6)}</span>
                    </div>
                `).join('') + `
                    <div class="flex items-center gap-2 p-2 bg-emerald-50 rounded-md">
                        <div class="w-2 h-2 rounded-full bg-emerald-500"></div>
                        <span class="text-sm text-emerald-700 font-bold truncate">You</span>
                    </div>
                `;
            }
        }

        copyBtn.onclick = () => {
            const text = myId;
            const tempInput = document.createElement('input');
            tempInput.value = text;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand('copy');
            document.body.removeChild(tempInput);
            
            const originalText = copyBtn.innerHTML;
            copyBtn.innerHTML = `<i data-lucide="check" class="w-3.5 h-3.5 text-emerald-500"></i><span>Copied!</span>`;
            lucide.createIcons();
            setTimeout(() => {
                copyBtn.innerHTML = originalText;
                lucide.createIcons();
            }, 2000);
        };

        function showStatus(msg, classes) {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-20 left-1/2 -translate-x-1/2 px-4 py-2 rounded-full text-xs font-bold shadow-lg z-50 animate-bounce ${classes}`;
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
    </script>
</body>
</html>
