<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConnectChat Pro | Safe and Efficient</title>
    <!-- Standard script imports as requested -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #eff6ff;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        .message-bubble {
            max-width: 85%;
            word-wrap: break-word;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #93c5fd;
            border-radius: 10px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }

        .status-pulse {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="flex items-center justify-center h-screen w-screen">

    <!-- Auth / Login Screen -->
    <div id="auth-screen" class="w-full max-w-md bg-white rounded-3xl shadow-2xl p-8 animate-fade-in m-4 z-50 border border-blue-100">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-blue-600 rounded-3xl mb-4 shadow-xl shadow-blue-200">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                </svg>
            </div>
            <h1 class="text-3xl font-extrabold text-blue-900 tracking-tight">ConnectChat</h1>
            <p class="text-blue-500 font-medium mt-2">100% P2P • No Servers • Blue Theme</p>
        </div>

        <div class="space-y-5">
            <div>
                <label class="block text-sm font-bold text-blue-900 mb-1.5 ml-1">Your Name</label>
                <input type="text" id="username" placeholder="e.g. Alex" class="w-full px-5 py-4 rounded-2xl border-2 border-blue-50 focus:border-blue-500 outline-none transition-all bg-blue-50/50 text-blue-900 placeholder-blue-300">
            </div>
            <div>
                <label class="block text-sm font-bold text-blue-900 mb-1.5 ml-1">Pick a Secret ID</label>
                <input type="text" id="peer-id" placeholder="e.g. secret_room_123" class="w-full px-5 py-4 rounded-2xl border-2 border-blue-50 focus:border-blue-500 outline-none transition-all bg-blue-50/50 text-blue-900 placeholder-blue-300 font-mono">
                <p class="text-[10px] text-blue-400 mt-2 ml-1">Give this ID to friends so they can find you.</p>
            </div>
            <button onclick="initSession()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl transition-all transform active:scale-[0.98] shadow-lg shadow-blue-200 mt-4">
                Enter Chat
            </button>
        </div>
    </div>

    <!-- Main Chat Screen -->
    <div id="chat-screen" class="hidden w-screen h-screen bg-white flex flex-col overflow-hidden animate-fade-in">
        <!-- Blue Header -->
        <div class="bg-blue-600 p-4 md:px-8 text-white flex flex-col md:flex-row md:items-center justify-between gap-4 shadow-lg z-20">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-blue-500/50 rounded-2xl flex items-center justify-center border border-white/20 backdrop-blur-sm">
                    <span id="user-initial" class="text-xl font-bold">?</span>
                </div>
                <div>
                    <h2 id="display-name" class="font-bold text-lg leading-tight">...</h2>
                    <p class="text-blue-100 text-[10px] flex items-center gap-1.5 uppercase tracking-widest font-bold">
                        <span id="status-indicator" class="w-2 h-2 bg-yellow-400 rounded-full status-pulse"></span>
                        <span id="status-text">Booting...</span>
                        <span class="mx-1 opacity-40">|</span>
                        MY ID: <span id="my-id-display" class="font-mono bg-blue-800/50 px-2 py-0.5 rounded">...</span>
                    </p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <input type="text" id="target-id" placeholder="Paste friend's ID" class="bg-blue-700/50 border border-blue-400/30 rounded-xl px-4 py-2.5 text-sm placeholder-blue-300 outline-none focus:bg-blue-800 transition-all w-full md:w-64 text-white font-mono">
                <button onclick="connectToPeer()" class="bg-white text-blue-600 px-6 py-2.5 rounded-xl text-sm font-black hover:bg-blue-50 transition-all shadow-md active:scale-95">
                    Connect
                </button>
            </div>
        </div>

        <div class="flex flex-grow overflow-hidden bg-blue-50/30">
            <!-- Blue Sidebar -->
            <div class="hidden md:flex flex-col w-72 bg-white border-r border-blue-100 overflow-y-auto custom-scrollbar">
                <div class="p-6 border-b border-blue-50 bg-white/80 backdrop-blur-md sticky top-0 z-10">
                    <h3 class="text-[11px] font-black text-blue-400 uppercase tracking-[0.2em] flex items-center justify-between">
                        Participants
                        <span id="contact-count" class="bg-blue-100 text-blue-600 px-2 py-0.5 rounded-full text-[10px]">0</span>
                    </h3>
                </div>
                <div id="contacts-list" class="p-3 space-y-2">
                    <div class="py-12 text-center">
                        <p class="text-xs text-blue-300 italic">No one else is here yet.</p>
                    </div>
                </div>
            </div>

            <!-- Chat Area -->
            <div class="flex flex-col flex-grow bg-white relative">
                <div id="messages-container" class="flex-grow p-4 md:p-8 overflow-y-auto custom-scrollbar space-y-6">
                    <div id="welcome-message" class="max-w-md mx-auto text-center py-20 animate-fade-in">
                        <div class="bg-blue-50 text-blue-600 w-24 h-24 rounded-[2rem] flex items-center justify-center mx-auto mb-6 shadow-inner">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A10.003 10.003 0 0012 3a10.003 10.003 0 00-6.912 2.72L5 6.5" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 14v2m-3-3l3 3m3-3l-3 3M6 10h.01M9 16h.01" />
                            </svg>
                        </div>
                        <h3 class="text-2xl font-black text-blue-900">Direct Link Active</h3>
                        <p class="text-sm text-blue-500 mt-4 leading-relaxed px-6">Your connection is private and encrypted point-to-point. Share your ID to start a group chat.</p>
                    </div>
                </div>

                <!-- Input Area -->
                <div class="p-4 md:p-6 bg-white border-t border-blue-50">
                    <div class="max-w-4xl mx-auto relative">
                        <form id="chat-form" onsubmit="sendMessage(event)" class="flex gap-3">
                            <input type="text" id="message-input" placeholder="Type your message..." class="flex-grow px-6 py-4 bg-blue-50/50 rounded-2xl border-2 border-transparent focus:border-blue-600 focus:bg-white outline-none transition-all text-sm md:text-base text-blue-900">
                            <button type="submit" class="bg-blue-600 text-white px-8 rounded-2xl hover:bg-blue-700 transition-all transform active:scale-90 shadow-xl shadow-blue-200">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                                </svg>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3" preload="auto"></audio>

    <script>
        /**
         * P2P Core Logic
         * No React, No JSX. Pure JS.
         */
        let peer;
        let connections = {}; 
        let peerNames = {}; 
        let userData = { name: '', id: '' };

        const authScreen = document.getElementById('auth-screen');
        const chatScreen = document.getElementById('chat-screen');
        const messagesContainer = document.getElementById('messages-container');
        const contactsList = document.getElementById('contacts-list');

        function initSession() {
            userData.name = document.getElementById('username').value.trim();
            userData.id = document.getElementById('peer-id').value.trim();

            if (!userData.name || !userData.id) {
                alert("Please fill in your name and a secret ID!");
                return;
            }

            createPeer();
        }

        function createPeer() {
            // Updated ICE Servers for better NAT traversal
            peer = new Peer(userData.id, {
                debug: 1,
                config: {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' },
                        { urls: 'stun:stun2.l.google.com:19302' },
                        { urls: 'stun:global.stun.twilio.com:3478?transport=udp' }
                    ]
                }
            });

            peer.on('open', (id) => {
                updateUIState(true);
                authScreen.classList.add('hidden');
                chatScreen.classList.remove('hidden');
                
                // Set visual identity
                document.getElementById('display-name').innerText = userData.name;
                document.getElementById('my-id-display').innerText = id;
                document.getElementById('user-initial').innerText = userData.name.charAt(0).toUpperCase();
                
                startKeepAlive();
            });

            peer.on('connection', (conn) => {
                handleConnection(conn);
            });

            peer.on('error', (err) => {
                console.error("PeerJS Error:", err.type);
                if (err.type === 'peer-unavailable') {
                    // Silent fail or alert if manual connect
                } else if (err.type === 'unavailable-id') {
                    alert("That ID is already in use by someone else. Try a more unique one!");
                    location.reload();
                }
            });

            peer.on('disconnected', () => {
                updateUIState(false);
                peer.reconnect();
            });
        }

        function startKeepAlive() {
            // 3-second heartbeat to prevent browser from killing the socket
            setInterval(() => {
                if (peer.disconnected && !peer.destroyed) peer.reconnect();
                
                Object.values(connections).forEach(conn => {
                    if (conn.open) conn.send({ type: 'hb' });
                });
            }, 3000);
        }

        function updateUIState(online) {
            const indicator = document.getElementById('status-indicator');
            const statusTxt = document.getElementById('status-text');
            if (online) {
                indicator.className = "w-2 h-2 bg-green-400 rounded-full shadow-[0_0_8px_rgba(74,222,128,0.6)]";
                statusTxt.innerText = "Online";
            } else {
                indicator.className = "w-2 h-2 bg-red-400 rounded-full status-pulse";
                statusTxt.innerText = "Reconnecting...";
            }
        }

        function connectToPeer() {
            const targetId = document.getElementById('target-id').value.trim();
            if (!targetId || targetId === userData.id || connections[targetId]) return;

            const conn = peer.connect(targetId, { reliable: true });
            handleConnection(conn);
            document.getElementById('target-id').value = '';
        }

        function handleConnection(conn) {
            conn.on('open', () => {
                if (!connections[conn.peer]) {
                    connections[conn.peer] = conn;
                    
                    // Immediately handshake
                    const myKnownPeers = Object.keys(connections).filter(id => id !== conn.peer);
                    conn.send({
                        type: 'handshake',
                        name: userData.name,
                        knownPeers: myKnownPeers
                    });

                    document.getElementById('welcome-message').classList.add('hidden');
                    updateContactsUI();
                }
            });

            conn.on('data', (data) => {
                if (data.type === 'chat') {
                    renderMessage(data.sender, data.text, false);
                    document.getElementById('notif-sound').play().catch(()=>{});
                } else if (data.type === 'handshake') {
                    peerNames[conn.peer] = data.name;
                    updateContactsUI();
                    
                    // Mesh Logic: If they know people I don't know, connect to them
                    if (data.knownPeers) {
                        data.knownPeers.forEach(id => {
                            if (id !== userData.id && !connections[id]) {
                                const newConn = peer.connect(id, { reliable: true });
                                handleConnection(newConn);
                            }
                        });
                    }
                }
            });

            const cleanup = () => {
                if (connections[conn.peer]) {
                    delete connections[conn.peer];
                    delete peerNames[conn.peer];
                    updateContactsUI();
                }
            };

            conn.on('close', cleanup);
            conn.on('error', cleanup);
        }

        function updateContactsUI() {
            const list = Object.keys(connections);
            document.getElementById('contact-count').innerText = list.length;
            
            if (list.length === 0) {
                contactsList.innerHTML = `<div class="py-12 text-center"><p class="text-xs text-blue-300 italic">No one else is here yet.</p></div>`;
                return;
            }

            contactsList.innerHTML = '';
            list.forEach(id => {
                const name = peerNames[id] || 'Joining...';
                const div = document.createElement('div');
                div.className = "flex items-center gap-4 p-4 bg-blue-50/50 rounded-2xl border border-blue-100/50 animate-fade-in mx-2 mb-2";
                div.innerHTML = `
                    <div class="w-10 h-10 rounded-xl bg-blue-600 text-white flex items-center justify-center font-black text-sm shadow-md">
                        ${name.charAt(0).toUpperCase()}
                    </div>
                    <div class="overflow-hidden">
                        <p class="text-sm font-bold text-blue-900 truncate">${name}</p>
                        <p class="text-[9px] font-mono text-blue-400 truncate uppercase tracking-tighter">${id}</p>
                    </div>
                `;
                contactsList.appendChild(div);
            });
        }

        function sendMessage(e) {
            e.preventDefault();
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text) return;

            const payload = { type: 'chat', sender: userData.name, text: text };
            
            // Broadcast to all active connections
            Object.values(connections).forEach(conn => {
                if (conn.open) conn.send(payload);
            });

            renderMessage('You', text, true);
            input.value = '';
        }

        function renderMessage(sender, text, isMe) {
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex flex-col ${isMe ? 'items-end' : 'items-start'} space-y-1 w-full px-2`;
            
            msgDiv.innerHTML = `
                <span class="text-[10px] font-black uppercase tracking-widest text-blue-400 px-4">${sender}</span>
                <div class="message-bubble px-6 py-4 rounded-[2rem] shadow-sm ${isMe ? 'bg-blue-600 text-white rounded-tr-none' : 'bg-blue-50 text-blue-900 rounded-tl-none border border-blue-100'}">
                    <p class="text-sm md:text-base font-medium">${escapeHTML(text)}</p>
                </div>
                <span class="text-[9px] text-blue-300 px-4 font-bold opacity-70">${time}</span>
            `;

            messagesContainer.appendChild(msgDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function escapeHTML(str) {
            const p = document.createElement('p');
            p.textContent = str;
            return p.innerHTML;
        }
    </script>
</body>
</html>
