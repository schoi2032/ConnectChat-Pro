<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConnectChatPro | Safe & Secure</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%233b82f6'/%3E%3Cstop offset='100%25' style='stop-color:%232563eb'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M12 2C6.477 2 2 6.14 2 11.25c0 2.858 1.423 5.41 3.656 7.081-.243.916-.906 2.394-2.156 3.419 0 0 2.5-.25 4.5-1.5a11.162 11.162 0 0 0 4 .75c5.523 0 10-4.14 10-9.25S17.523 2 12 2z' fill='url(%23g)'/%3E%3Cpath d='M8 11h.01M12 11h.01M16 11h.01' stroke='white' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E">

    <!-- PeerJS for P2P connections -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body, html {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            color: #1e293b;
            height: 100%;
            width: 100%;
            margin: 0;
            overflow: hidden;
        }

        .full-screen-app {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        .message-bubble {
            max-width: 75%;
            padding: 0.85rem 1.1rem;
            border-radius: 1.25rem;
            margin-bottom: 0.75rem;
            font-size: 0.95rem;
            line-height: 1.5;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .message-mine {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 0.25rem;
        }

        .message-theirs {
            background-color: white;
            color: #334155;
            align-self: flex-start;
            border-bottom-left-radius: 0.25rem;
            border: 1px solid #e2e8f0;
        }

        .custom-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .hidden { display: none !important; }

        /* Cooler Logo Animations */
        .logo-container {
            position: relative;
            transition: transform 0.3s ease;
        }
        .logo-container:hover {
            transform: scale(1.05);
        }
        .logo-pulse {
            position: absolute;
            inset: 0;
            background: #3b82f6;
            border-radius: 1.8rem;
            opacity: 0.2;
            animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 0.2; }
            50% { transform: scale(1.1); opacity: 0.1; }
            100% { transform: scale(0.95); opacity: 0.2; }
        }
        .logo-float {
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }
    </style>
</head>
<body class="flex flex-col">

    <div class="full-screen-app flex-col md:flex-row">
        
        <!-- SIDEBAR -->
        <aside class="w-full md:w-80 bg-white border-r border-slate-200 flex flex-col z-10 shadow-sm">
            <div class="p-8 flex flex-col items-center border-b border-slate-50">
                <!-- NEW LOGO -->
                <div class="logo-container logo-float">
                    <div class="logo-pulse"></div>
                    <div class="relative w-20 h-20 bg-gradient-to-br from-blue-400 to-blue-700 rounded-[1.8rem] flex items-center justify-center shadow-2xl shadow-blue-200 mb-4 overflow-hidden">
                        <!-- Abstract Glass Effect -->
                        <div class="absolute top-0 left-0 w-full h-1/2 bg-white/10 -skew-y-12 transform origin-top-left"></div>
                        <svg width="42" height="42" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 2C6.477 2 2 6.14 2 11.25c0 2.858 1.423 5.41 3.656 7.081-.243.916-.906 2.394-2.156 3.419 0 0 2.5-.25 4.5-1.5a11.162 11.162 0 0 0 4 .75c5.523 0 10-4.14 10-9.25S17.523 2 12 2z" fill="white" />
                            <circle cx="8" cy="11" r="1.5" fill="#3b82f6" fill-opacity="0.8"/>
                            <circle cx="12" cy="11" r="1.5" fill="#3b82f6" fill-opacity="0.8"/>
                            <circle cx="16" cy="11" r="1.5" fill="#3b82f6" fill-opacity="0.8"/>
                        </svg>
                    </div>
                </div>
                <h1 class="text-xl font-bold text-blue-600 tracking-tight mt-2">ConnectChat<span class="text-slate-800">Pro</span></h1>
            </div>

            <div class="flex-1 p-6 space-y-6">
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Status</label>
                    <div class="flex items-center gap-2 bg-slate-50 p-3 rounded-xl border border-slate-100">
                        <div id="status-dot" class="w-2.5 h-2.5 rounded-full bg-slate-300"></div>
                        <span id="status-text" class="text-sm font-medium">Offline</span>
                    </div>
                </div>

                <div id="room-info-box" class="space-y-2 hidden">
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Space Details</label>
                    <div class="bg-blue-50 p-4 rounded-xl border border-blue-100">
                        <div class="text-blue-900 font-bold" id="side-space-name">-</div>
                        <div class="text-blue-600 text-xs mt-1">Direct P2P Link Active</div>
                    </div>
                    <div class="pt-2">
                        <label class="text-[10px] font-bold text-slate-400 uppercase">Participants</label>
                        <ul id="peer-list" class="mt-2 space-y-1">
                            <li class="text-xs text-slate-600 flex items-center gap-2">
                                <span class="w-1.5 h-1.5 rounded-full bg-green-500"></span> You (Online)
                            </li>
                        </ul>
                    </div>
                </div>
            </div>

            <div class="p-6 border-t border-slate-100 text-[10px] text-slate-400 text-center">
                Securely connected via WebRTC
            </div>
        </aside>

        <!-- MAIN -->
        <main class="flex-1 flex flex-col relative bg-slate-50">
            
            <!-- LOGIN SCREEN -->
            <div id="setup-screen" class="absolute inset-0 z-20 bg-slate-50 flex items-center justify-center p-6">
                <div class="w-full max-w-md bg-white p-10 rounded-[2.5rem] shadow-2xl border border-slate-100 space-y-6">
                    <div class="text-center">
                        <h2 class="text-3xl font-bold text-slate-800">Welcome</h2>
                        <p class="text-slate-500 mt-2">Enter your name and space info.</p>
                    </div>

                    <div class="space-y-4">
                        <input type="text" id="user-name" placeholder="Your Name" class="w-full p-4 rounded-2xl bg-slate-50 ring-1 ring-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
                        <input type="text" id="space-name" placeholder="Space Name (e.g. MySecretClub)" class="w-full p-4 rounded-2xl bg-slate-50 ring-1 ring-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
                        <input type="password" id="space-pass" placeholder="Space Password" class="w-full p-4 rounded-2xl bg-slate-50 ring-1 ring-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="enterSpace(true)" class="bg-blue-600 text-white py-4 rounded-2xl font-bold hover:bg-blue-700 transition-all shadow-lg shadow-blue-100">Create</button>
                        <button onclick="enterSpace(false)" class="bg-slate-800 text-white py-4 rounded-2xl font-bold hover:bg-slate-900 transition-all">Join</button>
                    </div>

                    <div id="error-msg" class="text-center text-xs text-red-500 font-medium"></div>
                </div>
            </div>

            <!-- CHAT AREA -->
            <div id="chat-screen" class="hidden flex-1 flex flex-col h-full overflow-hidden">
                <div id="messages" class="flex-1 p-6 md:p-10 overflow-y-auto flex flex-col custom-scroll bg-slate-50">
                    <div class="text-center my-6">
                        <span class="px-4 py-2 rounded-full bg-white border border-slate-200 text-[10px] text-slate-400 font-bold uppercase tracking-widest">Secure Room Connected</span>
                    </div>
                </div>

                <div class="p-6 md:p-8 bg-white border-t border-slate-200">
                    <div class="max-w-4xl mx-auto flex items-center gap-4 bg-slate-100 p-2 rounded-[2rem] border border-slate-200 focus-within:ring-2 ring-blue-500 transition-all">
                        <input type="text" id="msg-input" placeholder="Type a message..." class="flex-1 bg-transparent border-none outline-none px-6 py-2 text-slate-700">
                        <button onclick="sendChat()" class="w-12 h-12 bg-blue-600 text-white rounded-full flex items-center justify-center hover:bg-blue-700 shadow-lg shadow-blue-200 transition-all">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
                        </button>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <script>
        let peer;
        let connections = [];
        let myName = "";
        let roomName = "";
        let roomPass = "";

        function playNotificationSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(440, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.15);
            } catch (e) {
                console.log("Audio play blocked or unsupported");
            }
        }

        async function enterSpace(isCreating) {
            myName = document.getElementById('user-name').value.trim();
            roomName = document.getElementById('space-name').value.trim();
            roomPass = document.getElementById('space-pass').value.trim();
            const errorEl = document.getElementById('error-msg');

            if (!myName || !roomName || !roomPass) {
                errorEl.innerText = "Please fill in all fields.";
                return;
            }

            errorEl.innerText = "Connecting...";
            const roomId = "ccpro-" + btoa(roomName).substring(0, 12).toLowerCase();

            if (isCreating) {
                peer = new Peer(roomId);
                
                peer.on('open', (id) => {
                    setupChatUI();
                    updateStatus("Hosting Space", "bg-green-500");
                });

                peer.on('error', (err) => {
                    if (err.type === 'unavailable-id') {
                        errorEl.innerText = "This space name is already being hosted. Try 'Join' instead.";
                    } else {
                        errorEl.innerText = "Connection error: " + err.type;
                    }
                });

                peer.on('connection', (conn) => {
                    handleIncomingConnection(conn);
                });

            } else {
                peer = new Peer();
                
                peer.on('open', (id) => {
                    const conn = peer.connect(roomId, {
                        metadata: { senderName: myName, password: roomPass }
                    });
                    handleOutgoingConnection(conn);
                });

                peer.on('error', (err) => {
                    errorEl.innerText = "Could not find space. Make sure the host has created it.";
                });
            }
        }

        function setupChatUI() {
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('chat-screen').classList.remove('hidden');
            document.getElementById('room-info-box').classList.remove('hidden');
            document.getElementById('side-space-name').innerText = roomName;
        }

        function updateStatus(text, color) {
            document.getElementById('status-dot').className = `w-2.5 h-2.5 rounded-full ${color}`;
            document.getElementById('status-text').innerText = text;
        }

        function handleIncomingConnection(conn) {
            conn.on('open', () => {
                if (conn.metadata.password !== roomPass) {
                    conn.send({ type: 'system', content: 'WRONG_PASS' });
                    setTimeout(() => conn.close(), 500);
                    return;
                }
                
                connections.push(conn);
                addMessage("System", `${conn.metadata.senderName} joined the space.`, false);
                playNotificationSound();
                updatePeerList();
                
                conn.on('data', (data) => processData(data, conn));
                conn.on('close', () => removeConnection(conn));
            });
        }

        function handleOutgoingConnection(conn) {
            conn.on('open', () => {
                connections.push(conn);
                setupChatUI();
                updateStatus("Connected", "bg-green-500");
                addMessage("System", `Connected to ${roomName}.`, false);
                playNotificationSound();
                updatePeerList();
            });

            conn.on('data', (data) => {
                if (data.type === 'system' && data.content === 'WRONG_PASS') {
                    document.getElementById('error-msg').innerText = "Incorrect Password for this space.";
                    document.getElementById('setup-screen').classList.remove('hidden');
                    document.getElementById('chat-screen').classList.add('hidden');
                    peer.destroy();
                } else {
                    processData(data, conn);
                }
            });

            conn.on('close', () => {
                addMessage("System", "Disconnected from space.", false);
                setTimeout(() => location.reload(), 2000);
            });
        }

        function processData(data, fromConn) {
            if (data.type === 'chat') {
                addMessage(data.sender, data.content, false);
                playNotificationSound();
            }
        }

        function removeConnection(conn) {
            connections = connections.filter(c => c !== conn);
            addMessage("System", "Someone left the space.", false);
            updatePeerList();
        }

        function updatePeerList() {
            const list = document.getElementById('peer-list');
            list.innerHTML = `<li class="text-xs text-slate-600 flex items-center gap-2"><span class="w-1.5 h-1.5 rounded-full bg-green-500"></span> You (Online)</li>`;
            connections.forEach(c => {
                const name = c.metadata ? c.metadata.senderName : "Peer";
                list.innerHTML += `<li class="text-xs text-slate-600 flex items-center gap-2"><span class="w-1.5 h-1.5 rounded-full bg-blue-400"></span> ${name}</li>`;
            });
        }

        function sendChat() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text || (connections.length === 0 && !peer.id.startsWith('ccpro-'))) return;

            connections.forEach(conn => {
                conn.send({ type: 'chat', sender: myName, content: text });
            });

            addMessage(myName, text, true);
            input.value = "";
        }

        function addMessage(sender, text, isMine) {
            const container = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `message-bubble ${isMine ? 'message-mine' : 'message-theirs'}`;
            
            const nameSpan = document.createElement('div');
            nameSpan.className = 'text-[9px] opacity-70 mb-1 font-bold uppercase tracking-widest';
            nameSpan.innerText = sender;
            
            const textDiv = document.createElement('div');
            textDiv.innerText = text;

            div.appendChild(nameSpan);
            div.appendChild(textDiv);
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        document.getElementById('msg-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendChat();
        });
    </script>
</body>
</html>
